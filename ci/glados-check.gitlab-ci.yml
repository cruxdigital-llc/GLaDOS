# GLaDOS drift + type check for GitLab CI.
#
# Include it from your .gitlab-ci.yml:
#
#   include:
#     - local: 'ci/glados-check.gitlab-ci.yml'   # or a remote/project include
#
# It runs the vendored compiler in check mode: recompute the compile in-memory
# from the sources + manifest, diff against the installed files, run every type
# check, and verify the vendored manifest hash. Drift, a failed check, or a
# stale compile fail the job.
#
# The compiler needs the GLaDOS source tree to recompute. Point --source at it:
# vendor src/ alongside .glados/, or clone the GLaDOS repo in a before_script and
# pass --source. The rules ship report-only first; drop --report-only to enforce.

glados-check:
  stage: test
  image: python:3.12-slim
  script:
    - python .glados/glados.py check --target . --source . --report-only
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
