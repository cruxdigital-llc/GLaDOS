# GLaDOS drift + type check for GitHub Actions.
#
# Copy into .github/workflows/glados-check.yml (or paste the job into an existing
# workflow). It runs the vendored compiler in check mode: recompute the compile
# from sources + manifest, diff against installed files, run every type check,
# and verify the vendored manifest hash. Drift, a failed check, or a stale
# compile fail the job.
#
# The compiler needs the GLaDOS source tree to recompute. Vendor src/ alongside
# .glados/, or check out the GLaDOS repo in a prior step and pass --source. The
# check ships report-only first; drop --report-only to enforce.

name: glados-check

on:
  push:
  pull_request:

jobs:
  glados-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: glados check
        run: python .glados/glados.py check --target . --source . --report-only
